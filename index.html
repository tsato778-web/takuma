<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>採用ダッシュボード</title>
  <style>
    /* ---------- Design tokens ---------- */
    :root {
      /* Color — Light */
      --bg:            #f6f7f9;
      --surface:       #ffffff;
      --surface-2:     #f0f2f5;
      --border:        #e3e6ea;
      --text:          #121417;
      --text-muted:    #5b6470;
      --text-subtle:   #8b95a1;

      --brand:         #2f6feb;
      --brand-weak:    #e8efff;
      --success:       #1f9d55;
      --success-weak:  #e3f6ea;
      --warning:       #d98b12;
      --warning-weak:  #fdf1dc;
      --danger:        #d14343;
      --danger-weak:   #fbe4e4;
      --info:          #6b5bd1;
      --info-weak:     #ebe7fb;

      /* Radii */
      --r-sm: 6px;
      --r-md: 10px;
      --r-lg: 14px;
      --r-xl: 20px;

      /* Spacing */
      --s-1: 4px;
      --s-2: 8px;
      --s-3: 12px;
      --s-4: 16px;
      --s-5: 24px;
      --s-6: 32px;
      --s-7: 48px;

      /* Shadows */
      --shadow-1: 0 1px 2px rgba(17, 24, 39, .04), 0 1px 3px rgba(17, 24, 39, .06);
      --shadow-2: 0 4px 12px rgba(17, 24, 39, .08);
      --shadow-pop: 0 10px 30px rgba(17, 24, 39, .12);

      /* Layout */
      --sidebar-w: 232px;
      --header-h: 60px;
      --content-max: 1400px;

      /* Type */
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans",
              "Noto Sans JP", Meiryo, system-ui, sans-serif;
    }

    [data-theme="dark"] {
      --bg:            #0f1216;
      --surface:       #171b21;
      --surface-2:     #1f242c;
      --border:        #2a313b;
      --text:          #e9ecf1;
      --text-muted:    #a5afbd;
      --text-subtle:   #7b8493;

      --brand:         #6ea0ff;
      --brand-weak:    #1b2944;
      --success:       #4ecb82;
      --success-weak:  #163627;
      --warning:       #e6a84a;
      --warning-weak:  #3a2b13;
      --danger:        #ef6a6a;
      --danger-weak:   #3a1f20;
      --info:          #9d8ff0;
      --info-weak:     #25214a;

      --shadow-1: 0 1px 2px rgba(0, 0, 0, .35);
      --shadow-2: 0 4px 14px rgba(0, 0, 0, .45);
      --shadow-pop: 0 12px 32px rgba(0, 0, 0, .55);
    }

    /* ---------- Base ---------- */
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      color: var(--text);
      background: var(--bg);
      font-size: 14px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; cursor: pointer; }

    /* ---------- App shell ---------- */
    .app {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      min-height: 100vh;
    }

    /* ---------- Sidebar ---------- */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: var(--s-5) var(--s-4);
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: var(--s-5);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: var(--s-3);
      padding: 0 var(--s-2);
      font-weight: 700;
      font-size: 15px;
      letter-spacing: .02em;
    }
    .logo-mark {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--brand), var(--info));
      display: grid; place-items: center;
      color: #fff;
      font-weight: 800;
      font-size: 13px;
    }
    .nav {
      display: flex; flex-direction: column; gap: 2px;
    }
    .nav-section {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-subtle);
      padding: var(--s-3) var(--s-2) var(--s-2);
    }
    .nav-item {
      display: flex; align-items: center; gap: var(--s-3);
      padding: var(--s-2) var(--s-3);
      border-radius: var(--r-md);
      color: var(--text-muted);
      font-weight: 500;
    }
    .nav-item:hover { background: var(--surface-2); color: var(--text); }
    .nav-item.is-active {
      background: var(--brand-weak);
      color: var(--brand);
      font-weight: 600;
    }
    .nav-icon {
      width: 18px; height: 18px; flex: 0 0 18px;
      display: inline-block;
      background: currentColor;
      -webkit-mask: var(--icon) center/contain no-repeat;
              mask: var(--icon) center/contain no-repeat;
    }
    .nav-badge {
      margin-left: auto;
      font-size: 11px;
      background: var(--surface-2);
      color: var(--text-muted);
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 600;
    }
    .nav-item.is-active .nav-badge {
      background: var(--brand);
      color: #fff;
    }

    /* ---------- Main ---------- */
    .main {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* Header */
    .header {
      position: sticky; top: 0; z-index: 10;
      height: var(--header-h);
      background: color-mix(in srgb, var(--surface) 85%, transparent);
      backdrop-filter: saturate(180%) blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 0 var(--s-6);
      display: flex; align-items: center; gap: var(--s-4);
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      margin: 0;
      color: var(--text);
    }
    .crumbs {
      color: var(--text-subtle);
      font-size: 13px;
    }
    .header-actions {
      margin-left: auto;
      display: flex; align-items: center; gap: var(--s-2);
    }
    .search {
      display: flex; align-items: center;
      background: var(--surface-2);
      border: 1px solid transparent;
      border-radius: var(--r-md);
      padding: 6px 10px;
      width: 280px;
      transition: border-color .15s, background .15s;
    }
    .search:focus-within {
      background: var(--surface);
      border-color: var(--brand);
    }
    .search input {
      border: 0; outline: 0; background: transparent;
      color: var(--text);
      flex: 1; font-size: 13px;
    }
    .search kbd {
      font-family: var(--font);
      font-size: 11px;
      color: var(--text-subtle);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1px 6px; border-radius: 4px;
    }
    .icon-btn {
      width: 34px; height: 34px;
      border-radius: var(--r-md);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      display: grid; place-items: center;
      transition: background .15s, color .15s;
    }
    .icon-btn:hover { background: var(--surface-2); color: var(--text); }
    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg, #ffb347, #ff7e5f);
      color: #fff; font-weight: 700;
      display: grid; place-items: center;
      font-size: 13px;
    }

    /* Content */
    .content {
      padding: var(--s-6);
      max-width: var(--content-max);
      width: 100%;
      margin: 0 auto;
      display: flex; flex-direction: column;
      gap: var(--s-5);
    }
    .page-title {
      display: flex; align-items: end; justify-content: space-between;
      gap: var(--s-4);
      flex-wrap: wrap;
    }
    .page-title h2 {
      margin: 0 0 4px;
      font-size: 22px;
      letter-spacing: -.01em;
    }
    .page-title p {
      margin: 0;
      color: var(--text-muted);
    }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px;
      border-radius: var(--r-md);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-weight: 500;
      transition: background .15s, border-color .15s, transform .05s;
    }
    .btn:hover { background: var(--surface-2); }
    .btn:active { transform: translateY(1px); }
    .btn-primary {
      background: var(--brand);
      color: #fff;
      border-color: transparent;
    }
    .btn-primary:hover { background: color-mix(in srgb, var(--brand) 88%, #000); }

    /* Section placeholders (filled in next steps) */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: var(--s-5);
      box-shadow: var(--shadow-1);
    }
    .section h3 {
      margin: 0 0 var(--s-3);
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 600;
      letter-spacing: .02em;
    }
    .placeholder {
      height: 120px;
      display: grid; place-items: center;
      color: var(--text-subtle);
      background:
        repeating-linear-gradient(
          45deg,
          var(--surface-2) 0 10px,
          transparent 10px 20px
        );
      border-radius: var(--r-md);
      font-size: 13px;
    }

    /* Grid for upcoming section layout */
    .grid-2 {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: var(--s-5);
    }

    /* Responsive */
    @media (max-width: 960px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .content { padding: var(--s-4); }
      .grid-2 { grid-template-columns: 1fr; }
      .search { width: 160px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" aria-label="サイドナビゲーション">
      <div class="logo">
        <div class="logo-mark">T</div>
        <span>Takuma ATS</span>
      </div>

      <nav class="nav" aria-label="メイン">
        <div class="nav-section">メイン</div>
        <a class="nav-item is-active" href="#">
          <span class="nav-icon" style="--icon: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><path fill=%22%23000%22 d=%22M3 13h8V3H3v10Zm0 8h8v-6H3v6Zm10 0h8V11h-8v10Zm0-18v6h8V3h-8Z%22/></svg>')"></span>
          ダッシュボード
        </a>
        <a class="nav-item" href="#">
          <span class="nav-icon" style="--icon: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><path fill=%22%23000%22 d=%22M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5Zm0 2c-4 0-9 2-9 6v2h18v-2c0-4-5-6-9-6Z%22/></svg>')"></span>
          候補者
          <span class="nav-badge">124</span>
        </a>
        <a class="nav-item" href="#">
          <span class="nav-icon" style="--icon: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><path fill=%22%23000%22 d=%22M19 4h-2V2h-2v2H9V2H7v2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Zm0 16H5V10h14v10Z%22/></svg>')"></span>
          面接スケジュール
        </a>
        <a class="nav-item" href="#">
          <span class="nav-icon" style="--icon: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><path fill=%22%23000%22 d=%22M20 6h-4V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2H4a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2Zm-10-2h4v2h-4V4Z%22/></svg>')"></span>
          求人
          <span class="nav-badge">8</span>
        </a>
        <a class="nav-item" href="#">
          <span class="nav-icon" style="--icon: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><path fill=%22%23000%22 d=%22M3 3h8v8H3V3Zm10 0h8v5h-8V3ZM3 13h5v8H3v-8Zm7 0h11v8H10v-8Zm3-3h8V8h-8v2Z%22/></svg>')"></span>
          レポート
        </a>

        <div class="nav-section">ワークスペース</div>
        <a class="nav-item" href="#">
          <span class="nav-icon" style="--icon: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><path fill=%22%23000%22 d=%22M16 11a4 4 0 1 0-4-4 4 4 0 0 0 4 4Zm-8 0a4 4 0 1 0-4-4 4 4 0 0 0 4 4Zm0 2c-2.7 0-8 1.3-8 4v3h16v-3c0-2.7-5.3-4-8-4Zm8 0h-1a6 6 0 0 1 3 5v3h6v-3c0-2.7-5.3-5-8-5Z%22/></svg>')"></span>
          チーム
        </a>
        <a class="nav-item" href="#">
          <span class="nav-icon" style="--icon: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><path fill=%22%23000%22 d=%22M12 8a4 4 0 1 0 4 4 4 4 0 0 0-4-4Zm8.9 4.6 2.1 1.6-2 3.5-2.5-1a8 8 0 0 1-2 1.2l-.4 2.6h-4l-.4-2.6a8 8 0 0 1-2-1.2l-2.5 1-2-3.5 2.1-1.6a8 8 0 0 1 0-2.2L1 9.3l2-3.5 2.5 1a8 8 0 0 1 2-1.2L7.9 3h4.2l.4 2.6a8 8 0 0 1 2 1.2l2.5-1 2 3.5-2.1 1.6a8 8 0 0 1 0 1.7Z%22/></svg>')"></span>
          設定
        </a>
      </nav>

      <div style="margin-top: auto; padding: var(--s-3); background: var(--surface-2); border-radius: var(--r-md); font-size: 12px; color: var(--text-muted);">
        <strong style="color: var(--text);">ヒント:</strong>
        <kbd style="background:var(--surface);padding:1px 5px;border-radius:4px;border:1px solid var(--border);">/</kbd>
        で候補者を瞬時に検索
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="header">
        <div>
          <div class="crumbs">採用 &rsaquo; ダッシュボード</div>
        </div>

        <div class="header-actions">
          <div class="search">
            <input type="search" placeholder="候補者・求人を検索" aria-label="検索" />
            <kbd>/</kbd>
          </div>
          <button class="icon-btn" id="theme-toggle" aria-label="テーマ切り替え" title="テーマ切り替え">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v2m0 14v2m9-9h-2M5 12H3m15.5-6.5-1.4 1.4M6.9 17.1l-1.4 1.4m0-13 1.4 1.4m10.2 10.2 1.4 1.4M12 7a5 5 0 1 0 5 5 5 5 0 0 0-5-5Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
          <button class="icon-btn" aria-label="通知">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 22a2 2 0 0 0 2-2h-4a2 2 0 0 0 2 2Zm6-6V11a6 6 0 0 0-5-5.9V4a1 1 0 0 0-2 0v1.1A6 6 0 0 0 6 11v5l-2 2v1h16v-1Z"/></svg>
          </button>
          <div class="avatar" title="あなた">TS</div>
        </div>
      </header>

      <div class="content">
        <section class="page-title">
          <div>
            <h2>ダッシュボード</h2>
            <p>今週のチーム活動の要点をひと目で。</p>
          </div>
          <div style="display:flex; gap: var(--s-2);">
            <button class="btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 4h-2V2h-2v2H9V2H7v2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Zm0 16H5V10h14v10Z"/></svg>
              今週
            </button>
            <button class="btn btn-primary">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2Z"/></svg>
              候補者を追加
            </button>
          </div>
        </section>

        <!-- Placeholders populated in the next steps -->
        <section id="kpis" class="section" aria-label="KPI">
          <h3>主要指標</h3>
          <div class="placeholder">ステップ2でKPIカードを実装</div>
        </section>

        <div class="grid-2">
          <section id="funnel" class="section" aria-label="ファネル">
            <h3>選考ファネル</h3>
            <div class="placeholder">ステップ2でファネル可視化を実装</div>
          </section>
          <section id="action-needed" class="section" aria-label="要対応">
            <h3>要対応</h3>
            <div class="placeholder">ステップ2で要対応リストを実装</div>
          </section>
        </div>

        <section id="candidates" class="section" aria-label="候補者">
          <h3>候補者</h3>
          <div class="placeholder">ステップ3でテーブル・カンバンを実装</div>
        </section>
      </div>
    </main>
  </div>

  <script>
    // Theme toggle: persists to localStorage, respects prefers-color-scheme
    (() => {
      const root = document.documentElement;
      const KEY = 'takuma-theme';
      const saved = localStorage.getItem(KEY);
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const initial = saved || (prefersDark ? 'dark' : 'light');
      root.setAttribute('data-theme', initial);

      document.getElementById('theme-toggle').addEventListener('click', () => {
        const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        root.setAttribute('data-theme', next);
        localStorage.setItem(KEY, next);
      });

      // Focus search with "/"
      document.addEventListener('keydown', (e) => {
        if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
          e.preventDefault();
          document.querySelector('.search input').focus();
        }
      });
    })();
  </script>
</body>
</html>
